name: autofix.ci

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  MISE_EXPERIMENTAL: true

jobs:
  autofix:
    # release-plz PRs regenerate derived files inside the release-plz
    # workflow itself (`.github/workflows/release-plz.yml`), so skip
    # autofix here — otherwise the two jobs race on the same branch
    # and whichever loses gets a `--force-with-lease` rejection.
    if: >-
      github.actor != 'renovate[bot]'
      && github.actor != 'mend[bot]'
      && !startsWith(github.head_ref, 'release-plz-')
    runs-on: namespace-profile-endev-linux-amd64
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: namespacelabs/nscloud-cache-action@15799a6b54e5765f85b2aac25b3f0df43ed571c0 # v1
        with:
          cache: rust
      - uses: jdx/mise-action@b287efda3dc5f4f3c328507653b6617da783ff84 # v4
      - run: "mise run render ::: lint-fix"
      - uses: autofix-ci/action@7a166d7532b277f34e16238930461bf77f9d7ed8 # v1.3.3
